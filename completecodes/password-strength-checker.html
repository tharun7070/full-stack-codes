<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 320px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
        }

        p {
            margin: 5px;
        }

        #strength {
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2>Password Checker</h2>

        <input type="password" id="password"
               placeholder="Enter Password"
               onkeyup="checkPassword()">

        <p id="length"></p>
        <p id="upper"></p>
        <p id="lower"></p>
        <p id="number"></p>
        <p id="special"></p>

        <p id="strength"></p>

    </div>

    <script>

        function checkPassword() {

            let pass = document.getElementById("password").value;

            let hasUpper = /[A-Z]/.test(pass);
            let hasLower = /[a-z]/.test(pass);
            let hasNumber = /[0-9]/.test(pass);
            let hasSpecial = /[!@#$%^&*]/.test(pass);

            document.getElementById("length").innerHTML =
                pass.length >= 8 ? "&#10004; Minimum 8 characters"
                                 : "&#10008; Minimum 8 characters";

            document.getElementById("upper").innerHTML =
                hasUpper ? "&#10004; Uppercase letter"
                         : "&#10008; Uppercase letter";

            document.getElementById("lower").innerHTML =
                hasLower ? "&#10004; Lowercase letter"
                         : "&#10008; Lowercase letter";

            document.getElementById("number").innerHTML =
                hasNumber ? "&#10004; Number included"
                          : "&#10008; Number included";

            document.getElementById("special").innerHTML =
                hasSpecial ? "&#10004; Special character included"
                           : "&#10008; Special character included";

            let score = 0;

            if (pass.length >= 8) score++;
            if (hasUpper) score++;
            if (hasLower) score++;
            if (hasNumber) score++;
            if (hasSpecial) score++;

            let strength = document.getElementById("strength");

            if (score <= 2) {
                strength.innerHTML = "Weak Password";
                strength.style.color = "red";
            }
            else if (score <= 4) {
                strength.innerHTML = "Medium Password";
                strength.style.color = "orange";
            }
            else {
                strength.innerHTML = "Strong Password";
                strength.style.color = "green";
            }
        }

    </script>

</body>
</html>
